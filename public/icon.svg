<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#14141e"/>

  <!-- Ellipse 1: horizontal -->
  <ellipse cx="50" cy="50" rx="42" ry="17"
    fill="none" stroke="#61DAFB" stroke-width="3.5"/>

  <!-- Ellipse 2: rotated 60° -->
  <ellipse cx="50" cy="50" rx="42" ry="17"
    fill="none" stroke="#61DAFB" stroke-width="3.5"
    transform="rotate(60 50 50)"/>

  <!-- Ellipse 3: rotated 120° -->
  <ellipse cx="50" cy="50" rx="42" ry="17"
    fill="none" stroke="#61DAFB" stroke-width="3.5"
    transform="rotate(120 50 50)"/>

  <!-- Nucleus -->
  <circle cx="50" cy="50" r="5.5" fill="#61DAFB"/>
</svg>
