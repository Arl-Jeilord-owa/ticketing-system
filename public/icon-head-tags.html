<!-- ── Favicon & PWA Icons ──────────────────────────────────
     Copy the /icons/ folder into /public/assets/images/icons/
     then paste these tags into your <head>, replacing the old
     apple-touch-icon line.
─────────────────────────────────────────────────────────── -->

<!-- Standard favicon -->
<link rel="icon" type="image/x-icon"     href="/assets/images/icons/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/icons/favicon-16.png" />

<!-- SVG favicon (modern browsers — scales perfectly at any size) -->
<link rel="icon" type="image/svg+xml"    href="/assets/images/icons/icon.svg" />

<!-- Apple touch icon (iOS home screen) -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icons/apple-touch-icon.png" />

<!-- PWA manifest (already references icon-192 and icon-512) -->
<link rel="manifest" href="/manifest.json" />
